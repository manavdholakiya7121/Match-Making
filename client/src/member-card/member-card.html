@if(member(); as member) {
    <div routerLink="/members/{{member.id}}" class="card cursor-pointer hover-lift relative rounded-2xl overflow-hidden group shadow-lg" >
        <img 
        src="{{member?.imageUrl || '/user.png'}}" 
        alt="{{member.displayName}} image" 
        class="w-full aspect-[3/4] object-cover transition-transform duration-500 group-hover:scale-105">
        @if(isOnline()){
            <span class="status status-success status-xl absolute top-4 left-4 ring-4 ring-base-100/50"></span>
        }
        <button class="absolute top-3 right-3 z-40 btn btn-circle btn-sm bg-base-100/30 backdrop-blur-sm border-0 hover:bg-base-100/60 transition-all duration-200" (click)="toggleLike($event)">
            <svg xmlns="http://www.w3.org/2000/svg" 
            [attr.fill]="hasLiked() ? '#ef4444' : 'none'" 
            viewBox="0 0 24 24" 
            stroke-width="1.5" 
            stroke="white"
            class="size-5 transition-transform duration-200 hover:scale-110"
        >
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
        </svg>
        </button>
            <div class="card-actions z-40 
            absolute bottom-0 w-full px-5 py-4 rounded-b-2xl
            bg-gradient-to-t from-black/90 via-black/60 to-transparent
            ">
            <div class="flex flex-col text-white">  
                <span class="font-bold text-lg tracking-tight">{{member.displayName}}, {{member.dateOfBirth | age}}</span>
                <span class="text-sm text-white/70">{{member.city}}</span>
            </div>
        </div>
    </div>
}
