@if (!memberService.editMode()) {
  @if (photos(); as photos) {
    @if (photos.length > 0) {
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 auto-rows-min gap-4 p-4 h-[65vh] overflow-auto">
        @for (photo of photos; track photo.id) {
          <div class="relative group rounded-2xl overflow-hidden shadow-md hover-lift">
            <img src="{{ photo.url }}" alt="Photo" class="w-full aspect-square object-cover transition-transform duration-300 group-hover:scale-105" />
            @if (memberService.member()?.id === accountService.currentUser()?.id) {
              <app-star-button
                [disabled]="photo.url === memberService.member()?.imageUrl"
                [selected]="photo.url === memberService.member()?.imageUrl"
                (clickEvent)="setMainPhoto(photo)"
                class="absolute top-2 right-2"
              ></app-star-button>
              <app-delete-button
                [disabled]="photo.url === memberService.member()?.imageUrl"
                (clickEvent)="deletePhoto(photo.id)"
                class="absolute top-2 left-2"
              />
            }
          </div>
        }
      </div>
    } @else {
      <div class="flex flex-col items-center justify-center h-[40vh] text-base-content/40">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-16 mb-3">
          <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0 0 22.5 18.75V5.25A2.25 2.25 0 0 0 20.25 3H3.75A2.25 2.25 0 0 0 1.5 5.25v13.5A2.25 2.25 0 0 0 3.75 21Z" />
        </svg>
        <p class="text-lg">No photos available</p>
      </div>
    }
  }
} @else {
  <app-image-upload (uploadFile)="onUploadImage($event)" [loading]="loading()"></app-image-upload>
}
