@if(paginatedMembers(); as paginatedResult){
    <div class="flex flex-col w-full gap-6 animate-fade-in-up">
        <div class="flex justify-between items-center">
            <div class="flex gap-3 items-center">
                <button (click)="openModal()" class="btn btn-primary rounded-full px-6 shadow-md shadow-primary/20">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
                    </svg>
                    Filters
                </button>
                <button (click)="resetFilters()" class="btn btn-ghost rounded-full border border-base-content/10">
                    Reset
                </button>
                <div class="text-sm font-medium bg-primary/10 text-primary py-2 px-5 rounded-full capitalize">
                    {{displayMessage}}
                </div>
            </div>
            @if(paginatedResult.metadata; as metadata){
                <app-paginatior 
                [pageNumber]="metadata.currentPage"
                [totalCount]="metadata.totalCount"
                [pageSize]="metadata.pageSize"
                [totalPages]="metadata.totalPages"
                (pageChange)="onPageChange($event)"
                />
            }
        </div>
        @if(paginatedResult.items; as members){
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
        @for (member of members; track member.id) {
            <app-member-card [member]="member"></app-member-card>
        }
        </div>
    }
    </div>
    
       
}

<app-filter-modal 
    #filterModal
    [hidden]="!paginatedMembers()"
    (closeModal)="onClose()"
    (submitData)="onFilterChange($event)"
/>
