@if(memberService.member(); as member) {
<div class="flex flex-col gap-4">
    <div class="flex gap-8">
        <div class="flex items-center gap-2 text-base-content/70">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 text-primary">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
            </svg>
            <span class="text-sm font-medium">Member since:</span>
            <span class="text-sm">{{member.created | date: 'longDate'}}</span>
        </div>
        <div class="flex items-center gap-2 text-base-content/70">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 text-primary">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            <span class="text-sm font-medium">Last Active:</span>
            <span class="text-sm">{{member.lastActive | timeAgo}}</span>
        </div>
    </div>

    <div class="divider my-1"></div>

    <h3 class="text-lg font-bold text-primary flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
        About {{member.displayName}}
    </h3>
    @if(memberService.editMode()) {
    <form #editForm="ngForm" (ngSubmit)="updateProfile()" class="flex flex-col w-full gap-4">
        <label class="floating-label">
            <span>Display Name</span>
            <input class="input w-full rounded-xl" name="displayName" [(ngModel)]="editableMember.displayName"
                placeholder="Display name">
        </label>
        <label class="floating-label">
            <span>Description</span>
            <textarea class="textarea w-full rounded-xl min-h-28" name="description" [(ngModel)]="editableMember.description"
                placeholder="Description"></textarea>
        </label>
        <label class="floating-label">
            <span>City</span>
            <input class="input w-full rounded-xl" name="city" [(ngModel)]="editableMember.city" placeholder="City">
        </label>
        <label class="floating-label">
            <span>Country</span>
            <input class="input w-full rounded-xl" name="country" [(ngModel)]="editableMember.country" placeholder="Country">
        </label>
        <div class="flex self-end">
            <button [disabled]="!editForm.dirty" type="submit" class="btn btn-success rounded-full px-8 shadow-md">Submit</button>
        </div>
    </form> 
    } @else {
    <div class="text-base-content/80 leading-relaxed bg-base-200/50 rounded-2xl p-5">{{member.description || 'No description provided yet'}}</div>
    }

</div>
}
