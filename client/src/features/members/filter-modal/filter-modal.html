<dialog #filterModal class="modal">
  <div class="modal-box max-w-lg rounded-3xl shadow-2xl">
    <h3 class="text-xl font-bold text-base-content flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 text-primary">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
      </svg>
      Filters
    </h3>

    <div class="flex justify-between w-full items-center mt-6">
        <div class="flex flex-col w-full gap-5">
            <label class="flex justify-between items-center bg-base-200/50 p-4 rounded-2xl">
                <span class="font-medium text-sm">Gender</span>
                <form class="filter">
                    <input type="reset" value="x" class="btn btn-square btn-sm rounded-xl">
                    <input 
                        type="radio" class="btn btn-sm rounded-xl" 
                        [(ngModel)]="memberParams().gender"
                        aria-label="Male"
                        name="gender"
                        value="male"
                    >
                    <input 
                        type="radio" class="btn btn-sm rounded-xl" 
                        [(ngModel)]="memberParams().gender"
                        aria-label="Female"
                        name="gender"
                        value="female"
                    >
                </form>
            </label>
            <label class="flex justify-between items-center bg-base-200/50 p-4 rounded-2xl">
                <span class="font-medium text-sm">Age range</span>
                <div class="flex gap-3 items-center">
                    <input 
                        type="number"
                        class="input input-bordered w-20 rounded-xl"
                        [min]="18"
                        [(ngModel)]="memberParams().minAge"
                        name="minAge"
                        (change)="onMinAgeChange()"
                    >
                    <span class="text-base-content/40">—</span>
                    <input 
                        type="number"
                        class="input input-bordered w-20 rounded-xl"
                        [min]="memberParams().minAge || 18"
                        [(ngModel)]="memberParams().maxAge"
                        name="maxAge"
                        (change)="onMaxAgeChange()"
                    >
                </div>
            </label>
            <label class="flex justify-between items-center bg-base-200/50 p-4 rounded-2xl">
                <span class="font-medium text-sm">Order by</span>
                <select name="orderBy" class="select select-bordered rounded-xl" [(ngModel)]="memberParams().orderBy">
                    <option disabled selected>Order by</option>
                    <option value="created">Newest members</option>
                    <option value="lastActive">Last active</option>
                </select>
            </label>
        </div>
    </div>

    <div class="modal-action">
      <button (click)="submit()" class="btn btn-primary rounded-full px-8 shadow-md shadow-primary/20">Apply Filters</button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button (click)="close()">Close</button>
  </form>

</dialog>
