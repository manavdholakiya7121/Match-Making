<div class="hero min-h-screen relative overflow-hidden bg-gradient-to-br from-primary/10 via-base-100 to-accent/10">
    <!-- Decorative circles -->
    <div class="absolute top-20 left-10 w-72 h-72 bg-primary/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-10 w-96 h-96 bg-accent/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-secondary/5 rounded-full blur-3xl"></div>

    @if(!registerMode()){
        <div class="hero-content text-center relative z-10">
        <div class="flex flex-col items-center animate-fade-in-up max-w-2xl">
            <div class="relative mb-6">
                <div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl scale-150"></div>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                    class="size-32 text-primary relative drop-shadow-lg">
                    <path
                        d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z" />
                </svg>
            </div>
            <h1 class="text-6xl font-extrabold tracking-tight text-base-content leading-tight">
                Find Your <span class="text-primary">Perfect</span> Match
            </h1>
            <p class="py-6 text-lg text-base-content/60 max-w-lg">
                Join our vibrant community and connect with like-minded individuals. Your next meaningful connection is just a click away.
            </p>
            <div class="flex items-center gap-4 mt-2">
                @if(!accountService.currentUser()){
                   <button (click)="showRegister(true)" class="btn btn-primary btn-lg rounded-full px-10 shadow-xl shadow-primary/25 hover:shadow-primary/40 transition-all duration-300 hover:scale-105">Register Now</button>
                }
                
                <button class="btn btn-ghost btn-lg rounded-full border-2 border-base-content/10 hover:border-primary/30 px-8">Learn More</button>
            </div>
        </div>
    </div>
    }
     @else {
        <app-register (cancelRegister)="showRegister($event)" class="w-full relative z-10"></app-register>
    }
</div>
