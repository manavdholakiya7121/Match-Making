<dialog #dialogRef class="modal">
    <div class="modal-box rounded-3xl shadow-2xl">
        <div class="flex flex-col items-center text-center gap-3">
            <div class="w-14 h-14 rounded-full bg-warning/10 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7 text-warning">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
                </svg>
            </div>
            <h3 class="font-bold text-xl">{{message}}</h3>
            <p class="text-base-content/50 text-sm">This action cannot be undone</p>
        </div>
        <div class="modal-action justify-center gap-3 mt-6">
            <button class="btn btn-ghost rounded-full px-6" (click)="cancel()">Cancel</button>
            <button class="btn btn-primary rounded-full px-6 shadow-md" (click)="confirm()">Confirm</button>
        </div>
    </div>
</dialog>
