<div class="flex w-full gap-6 min-h-100">
    <div class="flex items-center gap-4 w-3/3">
       <label (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)"
       [class.border-primary] = "isDragging"
       [class.border-4] = "isDragging"
       [class.bg-primary/5] = "isDragging"
       [class]="isDragging ? 'bg-primary/5' : ''"
       for="dropzone-file"
       class="flex flex-col items-center justify-center w-full border-2 border-base-content/15
       h-full border-dashed rounded-3xl cursor-pointer hover:border-primary/40 hover:bg-primary/5 transition-all duration-300">
    
        <div class="flex flex-col items-center gap-3 text-base-content/50">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-12 text-primary/50">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
            </svg>
            <p class="text-lg font-medium">Click to upload or drag and drop</p>
            <p class="text-sm">PNG, JPG, GIF up to 10MB</p>
        </div>
        <input type="file" id="dropzone-file" class="hidden" accept="image/*" (change)="onFileSelected($event)">
    
    </label>        
    </div>
    @if(imageSrc()) {
        <div class="flex flex-col gap-4 w-1/3">
        <div class="flex justify-center border-2 border-base-content/10 rounded-2xl overflow-hidden">
            <img src="{{imageSrc()}}" alt="Preview" class="aspect-square object-cover">
        </div>
        <div class="flex w-full gap-3">
            <button class="btn btn-ghost rounded-full flex-1 border border-base-content/10" (click)="onCancel()">Cancel</button>
            <button class="btn btn-primary rounded-full flex-1 shadow-md shadow-primary/20" (click)="onUploadFile()">
                @if(loading()) {
                    <span class="loading loading-spinner"></span>
                }
                Upload                
            </button>
        </div>
    </div>
    }
    
</div>
