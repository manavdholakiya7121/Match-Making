<header class="p-4 w-full fixed top-0 z-50 bg-base-100/70 backdrop-blur-xl border-b border-base-content/5 shadow-lg shadow-base-content/5">
  <div class="flex items-center px-6 lg:px-10 mx-auto gap-6">
    <!-- Logo -->
    <div>
      <a
        class="flex items-center gap-3 max-h-16 pr-6 border-r border-base-content/10 group"
        routerLink="/"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="text-accent"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="size-7 text-primary transition-transform duration-300 group-hover:scale-110"
        >
          <path
            d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z"
          />
        </svg>

        <h3 class="text-2xl font-bold tracking-tight text-base-content uppercase">Make Match</h3>
      </a>
    </div>

    <!-- Navigation Links -->
    <nav class="flex gap-1 my-2 uppercase text-sm font-medium tracking-wide">
      @if (accountService.currentUser()) {
        <a
          routerLink="/lists"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="text-primary bg-primary/10"
          class="px-4 py-2 rounded-full transition-all duration-200 hover:text-primary hover:bg-primary/10"
          >Lists</a
        >
        <a
          routerLink="/members"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="text-primary bg-primary/10"
          class="px-4 py-2 rounded-full transition-all duration-200 hover:text-primary hover:bg-primary/10"
          >Matches</a
        >
                
        <a
          routerLink="/admin" *appHasRole="['Admin', 'Moderator']"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="text-primary bg-primary/10"
          class="px-4 py-2 rounded-full transition-all duration-200 hover:text-primary hover:bg-primary/10"
          >Admin</a
        > 
        <a
          routerLink="/messages"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="text-primary bg-primary/10"
          class="px-4 py-2 rounded-full transition-all duration-200 hover:text-primary hover:bg-primary/10"
          >Messages</a
        >
      }
    </nav>

    @if(busyService.busyRequestCount() > 0) {
      <span class="loading loading-spinner text-primary"></span>
    }

    <!-- Right side -->
    <div class="flex items-center ml-auto gap-4">
      <!-- Theme Picker -->
      <div class="dropdown mr-2 dropdown-end">
        <button
          tabindex="1"
          class="flex flex-col items-center justify-center text-base-content/70 cursor-pointer uppercase text-xs hover:text-primary transition-colors duration-200"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9.53 16.122a3 3 0 0 0-5.78 1.128 2.25 2.25 0 0 1-2.4 2.245 4.5 4.5 0 0 0 8.4-2.245c0-.399-.078-.78-.22-1.128Zm0 0a15.998 15.998 0 0 0 3.388-1.62m-5.043-.025a15.994 15.994 0 0 1 1.622-3.395m3.42 3.42a15.995 15.995 0 0 0 4.764-4.648l3.876-5.814a1.151 1.151 0 0 0-1.597-1.597L14.146 6.32a15.996 15.996 0 0 0-4.649 4.763m3.42 3.42a6.776 6.776 0 0 0-3.42-3.42"
            />
          </svg>
          <span class="mt-0.5">{{ selectedTheme() }}</span>
        </button>
        <ul
          tabindex="1"
          class="dropdown-content z-50 menu bg-base-100 rounded-2xl w-52 p-2 shadow-xl border border-base-content/5 max-h-80 overflow-auto"
        >
          @for (theme of themes; track $index) {
            <li (click)="handleSelectedTheme(theme)">
              <a class="rounded-xl">{{ theme }}</a>
          </li>
          }
          
          
        </ul>
      </div>

      <!-- User Menu or Login -->
      @if (accountService.currentUser(); as user) {
        <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="flex items-center gap-3 cursor-pointer px-3 py-1.5 rounded-full hover:bg-base-200 transition-colors duration-200"
          >
            <img
              [src]="user?.imageUrl || '/user.png'"
              alt="User Avatar"
              class="w-10 h-10 rounded-full ring-2 ring-primary/30 object-cover"
            />
            <span class="font-medium text-base-content">{{ user.displayName }}</span>
          </div>
          <ul
            (click)="handleSelectedUserItem()"
            tabindex="0"
            class="dropdown-content menu bg-base-100 rounded-2xl z-1 w-52 p-2 shadow-xl border border-base-content/5 mt-2"
          >
            <li><a routerLink="/members/{{user.id}}" class="rounded-xl">Edit Profile</a></li>
            <li><a (click)="logout()" class="rounded-xl text-error">Logout</a></li>
          </ul>
        </div>
      } @else {
        <form #loginForm="ngForm" (ngSubmit)="login()" class="flex items-center gap-2">
          <input
            type="text"
            [(ngModel)]="creds.email"
            name="email"
            class="input input-bordered rounded-full bg-base-200/50 border-base-content/10 focus:border-primary"
            placeholder="Email"
          />
          <input
            type="password"
            [(ngModel)]="creds.password"
            name="password"
            class="input input-bordered rounded-full bg-base-200/50 border-base-content/10 focus:border-primary"
            placeholder="Password"
          />
          <button type="submit" class="btn btn-primary rounded-full px-6 shadow-md shadow-primary/20" >
            @if(loading()) {
              <span class="mr-2 loading loading-spinner"></span>
            }
            Login</button>
        </form>
      }
    </div>
  </div>
</header>
